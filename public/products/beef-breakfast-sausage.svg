<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Illustration of thin beef breakfast sausages with a fried egg">
  <defs>
    <radialGradient id="bg3" cx="50%" cy="42%" r="78%">
      <stop offset="0%" stop-color="#f8f0e1"/>
      <stop offset="100%" stop-color="#e7d9bf"/>
    </radialGradient>
    <radialGradient id="plate3" cx="50%" cy="44%" r="62%">
      <stop offset="0%" stop-color="#fbf7ef"/>
      <stop offset="100%" stop-color="#e3d6c0"/>
    </radialGradient>
    <linearGradient id="link3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b35f3f"/>
      <stop offset="100%" stop-color="#8a4026"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg3)"/>
  <!-- plate -->
  <ellipse cx="400" cy="312" rx="262" ry="232" fill="#9a8a70" opacity="0.22"/>
  <ellipse cx="400" cy="305" rx="262" ry="232" fill="url(#plate3)" stroke="#cbb99c" stroke-width="6"/>
  <ellipse cx="400" cy="305" rx="218" ry="190" fill="none" stroke="#d8c9ad" stroke-width="3" opacity="0.7"/>
  <!-- three thin breakfast sausages -->
  <g stroke-linecap="round">
    <!-- shadows -->
    <g stroke="#5a2d1a" stroke-width="26" opacity="0.28" fill="none" transform="translate(5,8)">
      <path d="M250 250 q150 -40 300 0"/>
      <path d="M240 312 q160 -36 320 0"/>
      <path d="M250 374 q150 40 300 0"/>
    </g>
    <!-- bodies -->
    <g stroke="url(#link3)" stroke-width="24" fill="none">
      <path d="M250 250 q150 -40 300 0"/>
      <path d="M240 312 q160 -36 320 0"/>
      <path d="M250 374 q150 40 300 0"/>
    </g>
    <!-- sheen -->
    <g stroke="#cf8463" stroke-width="6" fill="none" opacity="0.55">
      <path d="M255 244 q145 -38 290 0"/>
      <path d="M245 306 q155 -34 310 0"/>
      <path d="M255 368 q145 38 290 0"/>
    </g>
  </g>
  <!-- fried egg (breakfast cue) -->
  <g>
    <ellipse cx="300" cy="430" rx="78" ry="56" fill="#fbf6ec" stroke="#ece0cb" stroke-width="3"/>
    <ellipse cx="318" cy="438" rx="42" ry="34" fill="#fbf6ec"/>
    <circle cx="298" cy="426" r="26" fill="#f0a92b"/>
    <circle cx="290" cy="419" r="9" fill="#f6c45c" opacity="0.85"/>
  </g>
  <!-- speckles on sausages -->
  <g fill="#ecdcc1">
    <circle cx="330" cy="240" r="3"/><circle cx="420" cy="234" r="3"/><circle cx="500" cy="248" r="3"/>
    <circle cx="320" cy="304" r="3"/><circle cx="420" cy="298" r="3"/><circle cx="510" cy="306" r="3"/>
    <circle cx="330" cy="372" r="3"/><circle cx="420" cy="386" r="3"/><circle cx="500" cy="372" r="3"/>
  </g>
  <g fill="#3a2113">
    <circle cx="370" cy="238" r="2"/><circle cx="460" cy="240" r="2"/><circle cx="375" cy="300" r="2"/>
    <circle cx="465" cy="302" r="2"/><circle cx="370" cy="380" r="2"/><circle cx="460" cy="380" r="2"/>
  </g>
  <text x="400" y="567" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" fill="#8a4026" opacity="0.7" letter-spacing="4">SPICE ISLAND</text>
</svg>
