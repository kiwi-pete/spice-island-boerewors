<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Illustration of a bundle of dark air-dried beef dry wors sticks">
  <defs>
    <radialGradient id="bg4" cx="50%" cy="42%" r="78%">
      <stop offset="0%" stop-color="#f8f0e1"/>
      <stop offset="100%" stop-color="#e7d9bf"/>
    </radialGradient>
    <linearGradient id="board4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b08d57"/>
      <stop offset="100%" stop-color="#8a6531"/>
    </linearGradient>
    <linearGradient id="stick4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5d2c1c"/>
      <stop offset="50%" stop-color="#462014"/>
      <stop offset="100%" stop-color="#3a1c12"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg4)"/>
  <!-- slate board (rounded, dark-rimmed) -->
  <rect x="150" y="160" width="500" height="300" rx="24" fill="#5a4222" opacity="0.22" transform="translate(0,8)"/>
  <rect x="150" y="160" width="500" height="300" rx="24" fill="url(#board4)" stroke="#6c4f23" stroke-width="6"/>
  <!-- bundle of dried sticks (slightly fanned) -->
  <g stroke-linecap="round">
    <g stroke="#2c150d" stroke-width="22" opacity="0.3" fill="none" transform="translate(5,9)">
      <path d="M250 360 L 560 250"/><path d="M248 388 L 560 300"/><path d="M252 414 L 558 348"/><path d="M256 332 L 552 214"/>
    </g>
    <g stroke="url(#stick4)" stroke-width="20" fill="none">
      <path d="M256 332 L 552 214"/>
      <path d="M250 360 L 560 250"/>
      <path d="M248 388 L 560 300"/>
      <path d="M252 414 L 558 348"/>
    </g>
    <!-- subtle dried sheen -->
    <g stroke="#7a3a25" stroke-width="4" fill="none" opacity="0.4">
      <path d="M258 326 L 552 208"/><path d="M252 354 L 560 244"/><path d="M250 382 L 560 294"/><path d="M254 408 L 558 342"/>
    </g>
  </g>
  <!-- coarse cut texture flecks (lean + fat) -->
  <g fill="#c9b290" opacity="0.85">
    <circle cx="330" cy="316" r="2.6"/><circle cx="410" cy="288" r="2.6"/><circle cx="480" cy="258" r="2.6"/>
    <circle cx="340" cy="344" r="2.4"/><circle cx="430" cy="316" r="2.4"/><circle cx="500" cy="288" r="2.4"/>
    <circle cx="350" cy="372" r="2.4"/><circle cx="440" cy="346" r="2.4"/><circle cx="510" cy="320" r="2.4"/>
    <circle cx="360" cy="398" r="2.2"/><circle cx="450" cy="372" r="2.2"/><circle cx="515" cy="350" r="2.2"/>
  </g>
  <!-- twine tie around the middle -->
  <g transform="rotate(-20 405 320)">
    <rect x="386" y="276" width="40" height="92" rx="8" fill="#d8c197" stroke="#b59c6c" stroke-width="2"/>
    <g stroke="#b59c6c" stroke-width="2" opacity="0.8">
      <line x1="390" y1="288" x2="422" y2="288"/><line x1="390" y1="306" x2="422" y2="306"/>
      <line x1="390" y1="324" x2="422" y2="324"/><line x1="390" y1="342" x2="422" y2="342"/><line x1="390" y1="356" x2="422" y2="356"/>
    </g>
  </g>
  <text x="400" y="567" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" fill="#5d2c1c" opacity="0.7" letter-spacing="4">SPICE ISLAND</text>
</svg>
